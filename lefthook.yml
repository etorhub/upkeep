pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,js}"
      run: npm run lint
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test
    format:
      glob: "*.{ts,js,json,md}"
      run: npm run format:check
  skip:
    - merge
    - rebase

pre-push:
  commands:
    build:
      run: npm run build
